<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🌱 TaskFlow</h1>
      <p class="authors">by The Geekers 👾</p>
      <p class="tagline">Level up and grow your productivity!</p>
    </header>

    <section class="task-form">
      <h2>Create New Task</h2>

      <input id="taskTitle" type="text" placeholder="Task title" />
      <textarea id="taskDescription" placeholder="Description"></textarea>
      <input id="taskDueDate" type="date" />

      <select id="taskPriority">
        <option>Low Priority</option>
        <option>Medium Priority</option>
        <option>High Priority</option>
      </select>

      <input id="taskCategory" type="text" placeholder="Category" />

      <button id="addTaskButton">Add Task</button>
    </section>

    <section class="task-list">
      <h2>Your Tasks</h2>
      <div id="taskContainer"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
